services:
  web:
    build: .
    container_name: tickets-web
    restart: always
    environment:
      - NODE_ENV=production
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - PYTHON_OCR_URL=http://tickets-ocr:8001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tickets.rule=Host(`tickets.jdmasoft.com`)"
      - "traefik.http.routers.tickets.entrypoints=websecure"
      - "traefik.http.routers.tickets.tls.certresolver=letsencrypt"
      - "traefik.http.services.tickets.loadbalancer.server.port=3000"
    ports:
      - "127.0.0.1:3003:3000"
    networks:
      - dokploy-network

  ocr:
    image: python:3.11-slim
    container_name: tickets-ocr
    restart: always
    working_dir: /app
    command: bash -c "pip install -r requirements.txt && python main.py"
    volumes:
      - ./ocr-service:/app
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  dokploy-network:
    external: true
